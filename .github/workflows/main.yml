name: Stellaris Checksum Patcher

jobs:
  build-nuitka:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    env:
      NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v6
        with:
          path: ${{ env.NUITKA_CACHE_DIR }}
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}-
            ${{ runner.os }}-nuitka-

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.25"
          enable-cache: true
          cache-suffix: nuitka

      - name: Install ccache (Linux only)
        uses: hendrikmuhs/ccache-action@v1.2
        if: ${{ runner.os == 'Linux' }}

      - name: Install Dependency Walker for Nuitka (Windows only)
        uses: onesoftqwq/dependency-walker-installer@v1.0
        if: ${{ runner.os == 'Windows' }}

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build Nuitka binary
        run: uv run ./builds/build-nuitka.py

      - name: Upload Nuitka binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ runner.os }} Build
          path: |
            Stellaris-Checksum-Patcher-Nuitka-linux
            Stellaris-Checksum-Patcher-Nuitka-win.exe

  build-pyinstaller:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.25"
          enable-cache: true
          cache-suffix: pyinstaller

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build PyInstaller binary
        run: uv run ./builds/build-pyinstaller.py

      - name: Upload PyInstaller binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ runner.os }} Build
          path: |
            Stellaris-Checksum-Patcher-PyInstaller-linux
            Stellaris-Checksum-Patcher-PyInstaller-win.exe

on: push